# CI workflow for codec-cortex CLI
# Runs on every PR and push to main

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI"
        type: boolean
        default: false

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for setuptools-scm

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: pip install ruff && ruff check src/

      - name: Test with pytest
        run: |
          python -m pytest src/tests/ -q

      - name: Verify canonical artifacts
        run: |
          cortex verify-view ../skill/cortex/SKILL.md
          cortex roundtrip-bidir ../skill/cortex/SKILL.md
          cortex inspect ../skill/cortex/SKILL.md --format json > /dev/null

  build:
    name: Build package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: cli/dist/
